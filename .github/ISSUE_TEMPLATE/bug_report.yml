name: Bug report
description: Report a problem with the MCP server
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure the MCP with ...
        2. Call tool ...
        3. See error ...
  - type: input
    id: bitbucket-version
    attributes:
      label: Bitbucket Server version
      placeholder: "8.9.4"
  - type: input
    id: node-version
    attributes:
      label: Node.js / Bun version
      placeholder: "node 22.14 / bun 1.3"
  - type: input
    id: client
    attributes:
      label: MCP client
      placeholder: "Claude Desktop / Claude Code / VS Code / other"
