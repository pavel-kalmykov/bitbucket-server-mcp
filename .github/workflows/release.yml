name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions: {}

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    environment: npm
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    outputs:
      published: ${{ steps.info.outputs.published }}
      tag: ${{ steps.info.outputs.tag }}
      version: ${{ steps.info.outputs.version }}
      digest: ${{ steps.digest.outputs.digest }}
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.x
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: npx semantic-release

      # After semantic-release runs, a successful release leaves a new
      # annotated tag pointing at HEAD (and bumps package.json). If no
      # release happened (no releasable commits), no tag is on HEAD and
      # downstream jobs are skipped.
      - name: Detect published release
        id: info
        run: |
          TAG=$(git tag --points-at HEAD | head -n1)
          if [ -n "$TAG" ]; then
            printf 'published=true\n' >> "$GITHUB_OUTPUT"
            printf 'tag=%s\n' "$TAG" >> "$GITHUB_OUTPUT"
            printf 'version=%s\n' "${TAG#v}" >> "$GITHUB_OUTPUT"
          else
            printf 'published=false\n' >> "$GITHUB_OUTPUT"
          fi

      - name: Pack npm tarball
        if: steps.info.outputs.published == 'true'
        run: npm pack

      # slsa-github-generator expects `base64-subjects` as the base64
      # encoding of one or more `<sha256hex>  <filename>` lines (the
      # same format `sha256sum` produces). Single tarball here.
      - name: Compute tarball digest for provenance
        id: digest
        if: steps.info.outputs.published == 'true'
        run: |
          TARBALL=$(ls ./*.tgz | head -n1)
          printf 'digest=%s\n' "$(sha256sum "$TARBALL" | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Upload tarball to GitHub release
        if: steps.info.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh release upload "${{ steps.info.outputs.tag }}" ./*.tgz --clobber

  # Generates a signed SLSA v1.0 provenance (.intoto.jsonl) for the
  # npm tarball and uploads it as an asset to the same GitHub release.
  # Runs in the reusable workflow's own isolated context so the
  # attestation is non-forgeable from our job code (SLSA Build L3).
  provenance:
    name: SLSA provenance
    needs: release
    if: needs.release.outputs.published == 'true'
    permissions:
      actions: read
      contents: write
      id-token: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: ${{ needs.release.outputs.digest }}
      upload-assets: true
      upload-tag-name: ${{ needs.release.outputs.tag }}
      provenance-name: bitbucket-server-mcp-${{ needs.release.outputs.version }}.intoto.jsonl

  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.published == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ needs.release.outputs.version }}
