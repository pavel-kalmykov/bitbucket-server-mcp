name: Release

on:
  # Chained after E2E, which itself is chained after CI. So by the time
  # this fires, both CI and the E2E matrix have completed successfully
  # on this commit; semantic-release runs once, no cross-workflow gate.
  workflow_run:
    workflows: [E2E]
    types: [completed]
    branches: [main]

permissions: {}

jobs:
  release:
    name: Publish to npm
    # E2E was already conditioned to only run when CI was triggered by
    # `push`, so by the time we get here the "push on main" gate is
    # transitive; only the direct conclusion of E2E needs checking.
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    outputs:
      published: ${{ steps.info.outputs.published }}
      tag: ${{ steps.info.outputs.tag }}
      version: ${{ steps.info.outputs.version }}
      digest: ${{ steps.digest.outputs.digest }}
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.x
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: npx semantic-release

      # A successful release leaves `package.json`, `package-lock.json`
      # and `CHANGELOG.md` bumped in the working tree; if none of them
      # changed, no release happened and downstream jobs are skipped.
      # The git commit back to main is done in the next step via
      # `createCommitOnBranch` so the commit is GitHub-signed and the
      # ruleset can require signatures with zero bypass_actors.
      - name: Detect published release
        id: info
        run: |
          if git diff --quiet -- package.json; then
            printf 'published=false\n' >> "$GITHUB_OUTPUT"
          else
            VERSION=$(node -p "require('./package.json').version")
            printf 'published=true\n' >> "$GITHUB_OUTPUT"
            printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
            printf 'tag=v%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
          fi

      # Commit the version bump and changelog back to main via the
      # GraphQL `createCommitOnBranch` mutation. GitHub signs commits
      # created through that endpoint with the App's identity, which
      # satisfies the `required_signatures` rule on main without
      # listing the App under `bypass_actors`.
      - name: Commit release assets (signed)
        if: steps.info.outputs.published == 'true'
        uses: planetscale/ghcommit-action@25309d8005ac7c3bcd61d3fe19b69e0fe47dbdde # v0.2.20
        with:
          commit_message: "chore(release): ${{ steps.info.outputs.version }} [skip ci]"
          repo: ${{ github.repository }}
          branch: main
          file_pattern: "package.json package-lock.json CHANGELOG.md"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      # Create the GitHub Release with `--target main` so the tag lands
      # on the signed commit just pushed by ghcommit-action. Matches
      # how planetscale/ghcommit-action releases itself.
      - name: Create GitHub Release
        if: steps.info.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh release create "${{ steps.info.outputs.tag }}" \
            --target main \
            --title "${{ steps.info.outputs.tag }}" \
            --generate-notes

      - name: Pack npm tarball
        if: steps.info.outputs.published == 'true'
        run: npm pack

      # slsa-github-generator expects `base64-subjects` as the base64
      # encoding of one or more `<sha256hex>  <filename>` lines (the
      # same format `sha256sum` produces). Single tarball here.
      - name: Compute tarball digest for provenance
        id: digest
        if: steps.info.outputs.published == 'true'
        run: |
          TARBALL=$(ls ./*.tgz | head -n1)
          printf 'digest=%s\n' "$(sha256sum "$TARBALL" | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Upload tarball to GitHub release
        if: steps.info.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh release upload "${{ steps.info.outputs.tag }}" ./*.tgz --clobber

      # Emulates the notifications that `@semantic-release/github`
      # used to post: a comment on every PR whose merge commit is
      # part of this release and on every issue closed by those
      # commits, plus a `released` label. Runs with the App token so
      # the bot identity that readers see is the same
      # (`bitbucket-mcp-bot`) as before this workflow switched off
      # `@semantic-release/github`.
      - name: Notify released PRs and issues
        if: steps.info.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ steps.info.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          release_url="https://github.com/$REPO/releases/tag/$TAG"
          prev_tag=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || true)
          if [ -n "$prev_tag" ]; then
            range="$prev_tag..$TAG"
          else
            range="$TAG"
          fi
          prs=$(git log --format=%s "$range" | grep -oE "#[0-9]+" | sort -u | tr -d '#')
          issues=$(git log --format=%B "$range" | grep -iEo "(close[sd]?|fix(e[sd])?|resolve[sd]?) #[0-9]+" | grep -oE "[0-9]+" | sort -u)
          gh label create released --color 0366d6 --description "Shipped in a release" --force >/dev/null
          for n in $prs; do
            gh pr comment "$n" --body ":tada: This PR is included in [$TAG]($release_url) :tada:" || true
            gh pr edit "$n" --add-label released || true
          done
          for n in $issues; do
            gh issue comment "$n" --body ":tada: This issue has been resolved in [$TAG]($release_url) :tada:" || true
            gh issue edit "$n" --add-label released || true
          done

  # Generates a signed SLSA v1.0 provenance (.intoto.jsonl) for the
  # npm tarball and uploads it as an asset to the same GitHub release.
  # Runs in the reusable workflow's own isolated context so the
  # attestation is non-forgeable from our job code (SLSA Build L3).
  provenance:
    name: SLSA provenance
    needs: release
    if: needs.release.outputs.published == 'true'
    permissions:
      actions: read
      contents: write
      id-token: write
    # Pinned to the semver tag rather than a commit SHA on purpose.
    # slsa-framework/slsa-github-generator#4216 (open) breaks
    # `builder-fetch.sh` when the reusable workflow is referenced by
    # SHA: the builder binary download fails with
    # `slsa-generator-generic-linux-amd64: No such file or directory`
    # (observed in our v0.6.8 release, run 24634716418). The SLSA
    # verifier also requires @vX.Y.Z format to match the published
    # builder identity.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.release.outputs.digest }}
      upload-assets: true
      upload-tag-name: ${{ needs.release.outputs.tag }}
      provenance-name: bitbucket-server-mcp-${{ needs.release.outputs.version }}.intoto.jsonl

  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.published == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ needs.release.outputs.version }}
