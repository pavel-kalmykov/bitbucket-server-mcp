name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    name: Build and test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    strategy:
      matrix:
        node-version: [22.x, 24.x]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Lint
        if: matrix.node-version == '24.x'
        run: npm run lint

      - name: Test
        run: ${{ matrix.node-version == '24.x' && 'npm run test:coverage' || 'npm test' }}

      - name: Upload coverage to Codecov
        if: matrix.node-version == '24.x'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage/
          fail_ci_if_error: false

      - run: npm run build

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: npm
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: npx semantic-release

  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: release
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Get version
        id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}

  pr-preview:
    name: Publish PR preview
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && vars.NPM_PREVIEW_ENABLED == 'true'
    permissions:
      contents: read
      pull-requests: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Publish preview to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
          CURRENT=$(node -p 'require("./package.json").version')
          PR_VERSION="${CURRENT}-pr.${{ github.event.number }}.$(git rev-parse --short HEAD)"
          npm version "$PR_VERSION" --no-git-tag-version
          npm publish --registry=https://npm.pkg.github.com --tag "pr-${{ github.event.number }}" --access public

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const {version} = require('./package.json');
            const tag = `pr-${prNumber}`;
            const body = [
              '## Preview published',
              '',
              `Test this PR build (version \`${version}\`):`,
              '```sh',
              '# authenticate with GitHub Packages (one-time)',
              'gh auth refresh --scopes read:packages --hostname github.com',
              'npm config set //npm.pkg.github.com/:_authToken "$(gh auth token)"',
              '',
              '# install the preview',
              'npm config set @pavel-kalmykov:registry https://npm.pkg.github.com',
              `npx -y @pavel-kalmykov/bitbucket-server-mcp@${tag}`,
              '',
              '# revert to npmjs.com after testing',
              'npm config delete @pavel-kalmykov:registry',
              '```',
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            const existing = comments.data.find(c => c.body.includes('## Preview published'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
            }

  pr-cleanup:
    name: Remove PR preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && vars.NPM_PREVIEW_ENABLED == 'true'
    permissions:
      packages: write
      pull-requests: write
    steps:
      - name: Delete preview package versions
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const pkg = 'bitbucket-server-mcp';
            try {
              const { data: versions } = await github.request(
                'GET /users/{username}/packages/{package_type}/{package_name}/versions',
                { username: context.repo.owner, package_type: 'npm', package_name: pkg }
              );
              const prVersions = versions.filter(v => v.name.includes(`-pr.${prNumber}.`));
              for (const v of prVersions) {
                await github.request(
                  'DELETE /users/{username}/packages/{package_type}/{package_name}/versions/{package_version_id}',
                  { username: context.repo.owner, package_type: 'npm', package_name: pkg, package_version_id: v.id }
                );
                core.info(`Deleted ${v.name}`);
              }
            } catch (error) {
              core.warning(`Could not clean up package versions: ${error.message}`);
            }

      - name: Delete preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number
            });
            const preview = comments.data.find(c => c.body.includes('## Preview published'));
            if (preview) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: preview.id
              });
            }
