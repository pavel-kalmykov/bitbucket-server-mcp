name: PR Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

permissions: {}

jobs:
  publish:
    name: Publish preview
    runs-on: ubuntu-latest
    if: github.event.action != 'closed' && vars.NPM_PREVIEW_ENABLED == 'true'
    permissions:
      contents: read
      pull-requests: write
      packages: write
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Publish preview to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
          CURRENT=$(node -p 'require("./package.json").version')
          PR_VERSION="${CURRENT}-pr.${{ github.event.number }}.$(git rev-parse --short HEAD)"
          npm version "$PR_VERSION" --no-git-tag-version
          npm publish --registry=https://npm.pkg.github.com --tag "pr-${{ github.event.number }}" --access public

      - name: Comment on PR
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71 # v9.0.0
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const {version} = require('./package.json');
            const tag = `pr-${prNumber}`;
            const body = [
              '## Preview published',
              '',
              `Test this PR build (version \`${version}\`):`,
              '```sh',
              '# authenticate with GitHub Packages (one-time)',
              'gh auth refresh --scopes read:packages --hostname github.com',
              'npm config set //npm.pkg.github.com/:_authToken "$(gh auth token)"',
              '',
              '# install the preview',
              'npm config set @pavel-kalmykov:registry https://npm.pkg.github.com',
              `npx -y @pavel-kalmykov/bitbucket-server-mcp@${tag}`,
              '',
              '# revert to npmjs.com after testing',
              'npm config delete @pavel-kalmykov:registry',
              '```',
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            const existing = comments.data.find(c => c.body.includes('## Preview published'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
            }

  cleanup:
    name: Remove preview
    runs-on: ubuntu-latest
    if: github.event.action == 'closed' && vars.NPM_PREVIEW_ENABLED == 'true'
    permissions:
      packages: write
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Delete preview package versions
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71 # v9.0.0
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const pkg = 'bitbucket-server-mcp';
            try {
              const { data: versions } = await github.request(
                'GET /users/{username}/packages/{package_type}/{package_name}/versions',
                { username: context.repo.owner, package_type: 'npm', package_name: pkg }
              );
              const prVersions = versions.filter(v => v.name.includes(`-pr.${prNumber}.`));
              for (const v of prVersions) {
                await github.request(
                  'DELETE /users/{username}/packages/{package_type}/{package_name}/versions/{package_version_id}',
                  { username: context.repo.owner, package_type: 'npm', package_name: pkg, package_version_id: v.id }
                );
                core.info(`Deleted ${v.name}`);
              }
            } catch (error) {
              core.warning(`Could not clean up package versions: ${error.message}`);
            }

      - name: Delete preview comment
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71 # v9.0.0
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number
            });
            const preview = comments.data.find(c => c.body.includes('## Preview published'));
            if (preview) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: preview.id
              });
            }
